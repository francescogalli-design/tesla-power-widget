name: HACS Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Preflight
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Event: $GITHUB_EVENT_NAME"

  release:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RAW_VERSION=$(python3 - <<'PY'
import json
with open("release.json", "r", encoding="utf-8") as f:
    data = json.load(f)
print(str(data.get("release_version", "")).strip())
PY
)
          if [ -z "${RAW_VERSION}" ]; then
            echo "release.json missing release_version" >&2
            exit 1
          fi

          # Support both 1.0 and 1.0.0
          if [[ "${RAW_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            BASE_VERSION="${RAW_VERSION}.0"
          else
            BASE_VERSION="${RAW_VERSION}"
          fi

          if ! [[ "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release_version format: ${RAW_VERSION}" >&2
            exit 1
          fi

          TAG="v${BASE_VERSION}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Release $TAG" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        id: create_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"

          # Idempotent: if tag exists on remote, skip tag creation without failing.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists on remote: ${TAG}. Skipping tag push."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "${TAG}"

          # Handle race conditions gracefully (e.g. another process creates tag first).
          if git push origin "${TAG}"; then
            echo "created=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag appeared on remote during push: ${TAG}. Continuing."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Failed to create/push tag ${TAG}" >&2
          exit 1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
